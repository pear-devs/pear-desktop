name: Release Stable (Manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "confirm" to publish the stable release'
        required: true
        default: 'confirm'

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'confirm'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Get version
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_ENV
          echo "CHANGELOG_ANCHOR=$(echo v$VERSION | sed -e 's/\.//g')" >> $GITHUB_ENV

      - name: Fetch draft release
        uses: cardinalby/git-get-release-action@v1
        id: get_draft_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          latest: true
          draft: true

      - name: Publish Release
        uses: irongut/EditRelease@v1
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          id: ${{ steps.get_draft_release.outputs.id }}
          draft: false
          prerelease: false
          replacename: true
          name: ${{ env.VERSION_TAG }}
          replacebody: true
          body: |
            ### 🚀 New Stable Release: ${{ env.VERSION_TAG }}

            This release includes the latest updates, bug fixes, and improvements.

            #### 📦 Artifacts
            - **Linux**: `.AppImage`, `.deb`, `.rpm`, `.snap`, `.flatpak`, `.tar.gz`.
            - **Windows**: `Web-Setup.exe` (Recommended), `.exe` (Portable).
            - **macOS**: `.dmg`.

            See the full [changelog](https://github.com/pear-devs/pear-desktop/blob/master/changelog.md#${{ env.CHANGELOG_ANCHOR }}) for a detailed list of changes.

            Thanks to all contributors! 🏅

      - name: Update changelog
        run: |
          pnpm changelog

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update changelog for ${{ env.VERSION_TAG }} [skip ci]
          file_pattern: "changelog.md"
          commit_user_name: CI
          commit_user_email: actions@github.com
